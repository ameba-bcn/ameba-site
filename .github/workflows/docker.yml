name: Docker Build & Push

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ameba-frontend

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,enable=${{ !contains(fromJson('["master", "main"]'), github.ref_name) }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # CLAVE: provenance: false elimina metadatos complejos que confunden al cliente Docker en Mac
          # al intentar hacer fallback a emulación AMD64.
          provenance: false
          build-args: |
            VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            VITE_SENTRY_ENVIRONMENT=${{ github.ref_name == 'master' && 'production' || 'development' }}
            VITE_VERSION=${{ steps.pkg.outputs.version }}
            VITE_COMMIT_SHA=${{ github.sha }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}

      - name: Image summary
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          CLEAN_TAGS="${TAGS//$'\n'/, }"
          echo "### 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Full Image Name**: \`$CLEAN_TAGS\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  deploy-dev:
    name: Deploy to dev
    needs: build-and-push
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Deploy to Dev Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          script: |
            cd ~/ameba-devops
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            export ENVIRONMENT dev
            docker compose --profile dev up -d --force-recreate
            docker image prune -f

      - name: Deployment summary
        run: |
          echo "### 🚀 Deployed to dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: dev" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy to prod
    needs: build-and-push
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Deploy to prod Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd ~/ameba-devops
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            export ENVIRONMENT=prod
            docker compose --profile prod up -d --force-recreate
            docker image prune -f

      - name: Deployment summary
        run: |
          echo "### 🚀 Deployed to prod" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: prod" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
